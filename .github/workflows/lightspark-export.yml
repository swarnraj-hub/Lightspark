name: Lightspark Transaction Export

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        type: string
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        type: string

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run Lightspark Export
        env:
          LIGHTSPARK_SESSION:    ${{ secrets.LIGHTSPARK_SESSION }}
          GMAIL_EMAIL:           ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          S3_BUCKET:             ${{ secrets.S3_BUCKET }}
          LIGHTSPARK_S3_PREFIX:  lightspark/raw/
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          python lightspark_export.py \
            --start_date "${{ inputs.start_date }}" \
            --end_date   "${{ inputs.end_date }}"

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lightspark-${{ inputs.start_date }}-to-${{ inputs.end_date }}
          path: downloads/*.csv
          if-no-files-found: warn

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lightspark-debug-screenshots
          path: "ls_dbg_*.png"
          if-no-files-found: ignore